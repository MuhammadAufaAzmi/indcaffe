spring.application.name=indcaffe-api

spring.datasource.url=jdbc:mysql://localhost:3306/indcaffe?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.h2.console.enabled=false

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# JWT Configuration (Custom properties)
jwt.secret=IndCaffeSuperSecretKeyForJwtGenerationDoNotShare12345!
jwt.expiration=86400000

# Server Port
server.port=8081
